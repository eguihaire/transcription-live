<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Transcription live</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 16px;
    }
    button {
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
    }
    #status {
      margin-top: 16px;
      font-weight: bold;
    }
    #output {
      border: 1px solid #ccc;
      padding: 20px;
      margin-top: 20px;
      min-height: 220px;
      white-space: pre-wrap;
    }
    #log {
      margin-top: 20px;
      padding: 12px;
      background: #f6f6f6;
      border: 1px solid #ddd;
      font-family: monospace;
      white-space: pre-wrap;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h2>Transcription live d'un onglet Chrome</h2>
  <button id="start">Démarrer transcription</button>
  <div id="status">Prêt</div>
  <div id="output"></div>
  <div id="log"></div>

  <script>
    const startBtn = document.getElementById("start");
    const output = document.getElementById("output");
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function addLog(text) {
      logEl.textContent += text + "\n";
      console.log(text);
    }

    function addText(text) {
      output.textContent += text;
    }

    startBtn.onclick = async () => {
      try {
        startBtn.disabled = true;
        output.textContent = "";
        logEl.textContent = "";

        setStatus("Création de session...");
        addLog("Appel /api/session");

        const tokenResponse = await fetch("/api/session");
        const session = await tokenResponse.json();

        addLog("Réponse /api/session reçue");

        if (!session.value) {
          throw new Error("Token éphémère introuvable");
        }

        const token = session.value;

        setStatus("Choisis l'onglet à partager...");
        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: true,
          audio: true
        });

        const audioTracks = stream.getAudioTracks();
        addLog("Audio tracks: " + audioTracks.length);

        if (!audioTracks.length) {
          throw new Error("Aucune piste audio détectée. Il faut choisir un onglet et activer le partage audio.");
        }

        setStatus("Connexion Realtime...");
        const pc = new RTCPeerConnection();

        pc.onconnectionstatechange = () => {
          addLog("RTCPeerConnection state: " + pc.connectionState);
          setStatus("Connexion: " + pc.connectionState);
        };

        pc.oniceconnectionstatechange = () => {
          addLog("ICE state: " + pc.iceConnectionState);
        };

        stream.getTracks().forEach(track => pc.addTrack(track, stream));

        const channel = pc.createDataChannel("oai-events");

        channel.onopen = () => {
          addLog("Data channel ouvert");
          setStatus("Transcription en cours...");
        };

        channel.onerror = (e) => {
          addLog("Erreur data channel");
          console.error(e);
        };

        channel.onmessage = (event) => {
          let msg;
          try {
            msg = JSON.parse(event.data);
          } catch {
            addLog("Message non JSON reçu");
            return;
          }

          addLog("Event: " + msg.type);

          if (
            msg.type === "conversation.item.input_audio_transcription.delta" &&
            msg.delta
          ) {
            addText(msg.delta);
          }

          if (
            msg.type === "conversation.item.input_audio_transcription.completed" &&
            msg.transcript
          ) {
            addText("\n");
          }

          if (msg.type === "error") {
            addLog("Erreur OpenAI: " + JSON.stringify(msg));
          }
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const response = await fetch("https://api.openai.com/v1/realtime/calls", {
          method: "POST",
          headers: {
            Authorization: `Bearer ${token}`,
            "Content-Type": "application/sdp"
          },
          body: offer.sdp
        });

        const answer = await response.text();

        if (!response.ok) {
          throw new Error("Erreur Realtime: " + answer);
        }

        await pc.setRemoteDescription({
          type: "answer",
          sdp: answer
        });

        addLog("Connexion WebRTC établie");
      } catch (err) {
        console.error(err);
        addLog("Erreur: " + err.message);
        setStatus("Erreur");
        startBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
